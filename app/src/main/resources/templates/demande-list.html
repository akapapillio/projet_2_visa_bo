<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Liste des Demandes</title>
    <!-- Basic styling for the BO -->
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f8f9fa; margin: 20px; }
        h1 { color: #343a40; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background-color: white; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        th, td { padding: 12px 15px; border-bottom: 1px solid #dee2e6; text-align: left; }
        th { background-color: #007bff; color: white; font-weight: 500; }
        tr:hover { background-color: #f1f3f5; }
        .badge { padding: 5px 10px; border-radius: 15px; font-size: 0.85em; font-weight: bold; }
        .badge-investisseur { background-color: #28a745; color: white; }
        .badge-travailleur { background-color: #17a2b8; color: white; }
    </style>
</head>
<body>

    <h1>Gestion des Visas - Liste des Demandes</h1>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Type de Demande</th>
                <th>Catégorie</th>
                <th>Nom du Demandeur</th>
                <th>Prénoms</th>
                <th>Date Demande</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="demande : ${demandes}">
                <td th:text="${demande.id}">1</td>
                <td th:text="${demande.typeDemande}">NOUVEAU_TITRE</td>
                <td>
                    <span th:text="${demande.categorieVisa}" 
                          th:classappend="${#strings.toString(demande.categorieVisa) == 'INVESTISSEUR'} ? 'badge badge-investisseur' : (${#strings.toString(demande.categorieVisa) == 'TRAVAILLEUR'} ? 'badge badge-travailleur' : 'badge')">
                    </span>
                </td>
                <td th:text="${demande.etatCivil != null ? demande.etatCivil.nom : ''}">Doe</td>
                <td th:text="${demande.etatCivil != null ? demande.etatCivil.prenoms : ''}">John</td>
                <td th:text="${demande.dateDemande}">2026-04-16</td>
            </tr>
            <tr th:if="${#lists.isEmpty(demandes)}">
                <td colspan="6" style="text-align: center; color: #6c757d;">Aucune demande enregistrée pour le moment.</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
